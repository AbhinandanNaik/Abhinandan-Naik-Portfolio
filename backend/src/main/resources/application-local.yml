spring:
  datasource:
    url: jdbc:h2:mem:portfoliodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: never
  flyway:
    enabled: false # H2 will be managed via DDL auto-update or manual creation for easy startup.
  cache:
    type: simple # Uses ConcurrentHashMap-based cache rather than requiring local Redis.

logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

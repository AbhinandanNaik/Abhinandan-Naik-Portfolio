spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL} # e.g. jdbc:postgresql://ep-xxxx.us-east-2.aws.neon.tech/portfolio?sslmode=require&prepareThreshold=0
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
      idle-timeout: 30000
      max-lifetime: 600000 # 10 minutes to respect Neon/PgBouncer serverless scaling
      connection-timeout: 30000
      pool-name: HikariPoolNeonProd
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: false
        format_sql: false
        use_sql_comments: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true
  cache:
    type: simple

logging:
  level:
    root: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
    org.flywaydb: INFO
